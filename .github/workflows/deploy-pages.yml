name: Deploy project page to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build and deploy landing page
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Generate landing page from README
        shell: bash
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          from html import escape
          from pathlib import Path
          import os

          readme = Path("README.md")
          text = readme.read_text(encoding="utf-8", errors="replace") if readme.exists() else ""
          lines = text.splitlines()

          title = os.environ["REPO_NAME"]
          for line in lines:
              if line.startswith("# "):
                  title = line[2:].strip()
                  break

          summary = ""
          for line in lines:
              stripped = line.strip()
              if stripped and not stripped.startswith("#") and not stripped.startswith("- ") and not stripped.startswith(">"):
                  summary = stripped
                  break

          excerpt = "\n".join(lines[:140]).strip()
          if not excerpt:
              excerpt = "Project documentation will appear here after README content is added."

          repo_url = os.environ["REPO_URL"]
          readme_url = f"{repo_url}/blob/{os.environ['REF_NAME']}/README.md"

          page = f"""<!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>{escape(title)}</title>
              <style>
                :root {{
                  --bg: #f4efe7;
                  --panel: #fffaf3;
                  --ink: #1c1917;
                  --muted: #57534e;
                  --line: #d6d3d1;
                  --accent: #0f766e;
                }}
                * {{ box-sizing: border-box; }}
                body {{
                  margin: 0;
                  font-family: Georgia, "Times New Roman", serif;
                  background: radial-gradient(circle at top, #fff7ed 0%, var(--bg) 55%, #e7e5e4 100%);
                  color: var(--ink);
                }}
                main {{
                  max-width: 860px;
                  margin: 0 auto;
                  padding: 48px 20px 64px;
                }}
                .panel {{
                  background: var(--panel);
                  border: 1px solid var(--line);
                  border-radius: 20px;
                  box-shadow: 0 18px 48px rgba(28, 25, 23, 0.08);
                  padding: 32px;
                }}
                h1 {{ font-size: clamp(2rem, 5vw, 3.4rem); margin: 0 0 12px; }}
                h2 {{ margin-top: 32px; }}
                p {{
                  line-height: 1.65;
                  color: var(--muted);
                }}
                .eyebrow {{
                  color: var(--accent);
                  font-size: 0.9rem;
                  font-weight: 700;
                  letter-spacing: 0.08em;
                  text-transform: uppercase;
                }}
                .actions {{
                  display: flex;
                  gap: 12px;
                  flex-wrap: wrap;
                  margin: 24px 0 28px;
                }}
                a.button {{
                  display: inline-block;
                  padding: 12px 16px;
                  border-radius: 999px;
                  border: 1px solid var(--accent);
                  text-decoration: none;
                  color: white;
                  background: var(--accent);
                }}
                a.link {{
                  color: var(--accent);
                  text-decoration: none;
                  font-weight: 600;
                }}
                pre {{
                  white-space: pre-wrap;
                  word-break: break-word;
                  border-radius: 16px;
                  padding: 20px;
                  background: #1c1917;
                  color: #f5f5f4;
                  overflow-x: auto;
                }}
              </style>
            </head>
            <body>
              <main>
                <section class="panel">
                  <p class="eyebrow">Autogenerated project page</p>
                  <h1>{escape(title)}</h1>
                  <p>{escape(summary or "This repository publishes its project page from GitHub Actions.")}</p>
                  <div class="actions">
                    <a class="button" href="{escape(repo_url, quote=True)}">View repository</a>
                    <a class="link" href="{escape(readme_url, quote=True)}">Open README</a>
                  </div>
                  <h2>README excerpt</h2>
                  <pre>{escape(excerpt)}</pre>
                </section>
              </main>
            </body>
          </html>
          """

          out = Path("_site")
          out.mkdir(exist_ok=True)
          (out / "index.html").write_text(page, encoding="utf-8")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
